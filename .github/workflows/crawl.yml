name: Crawl Telecom Addon Services

on:
  schedule:
    # 매일 밤 3시 KST = 18:00 UTC (전날)
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run crawler
        id: crawl
        run: python crawler/main.py
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet public/data/services.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/services.json
          git commit -m "chore: update telecom addon services data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lgu-debug-screenshots
          path: /tmp/lgu_*.png
          if-no-files-found: ignore

      - name: Report crawl result
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::warning::크롤링이 실패했습니다. 기존 데이터가 유지됩니다."
          exit 0
