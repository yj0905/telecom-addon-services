name: Crawl Telecom Addon Services

on:
  schedule:
    # 매일 오전 9시 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install Playwright browsers (SKT, KT용)
        run: python -m playwright install chromium --with-deps

      - name: Install Chrome (LGU+ Selenium용)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run crawler
        id: crawl
        run: python crawler/main.py
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet public/data/services.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/services.json
          git commit -m "chore: update telecom addon services data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Report crawl result
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::warning::크롤링이 실패했습니다. 기존 데이터가 유지됩니다."
          exit 0
